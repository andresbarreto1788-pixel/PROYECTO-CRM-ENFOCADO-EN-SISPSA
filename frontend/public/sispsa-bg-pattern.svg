<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="45%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="spot1" cx="30%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Base gradient -->
  <rect width="1440" height="900" fill="url(#bgGrad)"/>

  <!-- Atmospheric glows -->
  <ellipse cx="350" cy="200" rx="500" ry="400" fill="url(#spot1)"/>
  <ellipse cx="1150" cy="650" rx="450" ry="350" fill="url(#spot2)"/>

  <!-- Large decorative shield — top right -->
  <g opacity="0.06" transform="translate(980, -80) scale(3.5)">
    <path d="M50 6 L98 22 L98 58 Q98 90 50 104 Q2 90 2 58 L2 22 Z" fill="white" stroke="white" stroke-width="2"/>
    <rect x="44" y="34" width="12" height="32" rx="3" fill="white"/>
    <rect x="34" y="44" width="32" height="12" rx="3" fill="white"/>
  </g>

  <!-- Medium shield — bottom left -->
  <g opacity="0.05" transform="translate(-60, 560) scale(2.2)">
    <path d="M50 6 L98 22 L98 58 Q98 90 50 104 Q2 90 2 58 L2 22 Z" fill="white" stroke="white" stroke-width="2"/>
    <rect x="44" y="34" width="12" height="32" rx="3" fill="white"/>
    <rect x="34" y="44" width="32" height="12" rx="3" fill="white"/>
  </g>

  <!-- Heartbeat / ECG line -->
  <polyline points="0,500 200,500 260,500 290,380 320,600 355,450 385,450 500,450 540,450 570,340 600,560 630,450 800,450 1000,450 1440,450"
    stroke="rgba(96,165,250,0.15)" stroke-width="2" fill="none"/>

  <!-- Grid dots pattern -->
  <g opacity="0.07">
    <!-- Repeat every 60px -->
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="white"/>
    </pattern>
    <rect width="1440" height="900" fill="url(#dots)"/>
  </g>

  <!-- Subtle hexagon grid (medical/tech feel) -->
  <g opacity="0.04" stroke="white" stroke-width="1" fill="none">
    <!-- Row 1 -->
    <polygon points="100,80 130,60 160,80 160,120 130,140 100,120"/>
    <polygon points="200,80 230,60 260,80 260,120 230,140 200,120"/>
    <polygon points="1200,700 1230,680 1260,700 1260,740 1230,760 1200,740"/>
    <polygon points="1300,700 1330,680 1360,700 1360,740 1330,760 1300,740"/>
    <polygon points="1350,620 1380,600 1410,620 1410,660 1380,680 1350,660"/>
    <!-- Diagonal scatter -->
    <polygon points="50,750 80,730 110,750 110,790 80,810 50,790"/>
    <polygon points="150,700 180,680 210,700 210,740 180,760 150,740"/>
  </g>

  <!-- Top diagonal light band -->
  <rect x="-200" y="-100" width="800" height="6" rx="3" fill="rgba(255,255,255,0.05)" transform="rotate(25 0 0)"/>
  <rect x="600" y="-50" width="600" height="3" rx="2" fill="rgba(96,165,250,0.08)" transform="rotate(25 0 0)"/>

  <!-- Bottom gradient fade -->
  <rect x="0" y="700" width="1440" height="200" fill="url(#glow2)" opacity="0.5"/>
</svg>
