<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" fill="none">
  <defs>
    <linearGradient id="loginBg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="60%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <radialGradient id="loginSpot" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="loginSpot2" cx="80%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="720" height="900" fill="url(#loginBg)"/>
  <ellipse cx="280" cy="300" rx="400" ry="350" fill="url(#loginSpot)"/>
  <ellipse cx="580" cy="720" rx="320" ry="280" fill="url(#loginSpot2)"/>

  <!-- Large shield watermark -->
  <g opacity="0.08" transform="translate(100, 120) scale(4)">
    <path d="M50 6 L98 22 L98 58 Q98 90 50 104 Q2 90 2 58 L2 22 Z" fill="none" stroke="white" stroke-width="1.5"/>
    <rect x="44" y="34" width="12" height="32" rx="2.5" fill="white"/>
    <rect x="34" y="44" width="32" height="12" rx="2.5" fill="white"/>
  </g>

  <!-- Floating small shields -->
  <g opacity="0.12" stroke="white" stroke-width="1" fill="none">
    <path d="M580 80 L604 88 L604 108 Q604 124 580 130 Q556 124 556 108 L556 88 Z"/>
    <rect x="577" y="99" width="6" height="16" rx="1.5" fill="white"/>
    <rect x="572" y="104" width="16" height="6" rx="1.5" fill="white"/>
  </g>

  <g opacity="0.08" stroke="white" stroke-width="0.8" fill="none">
    <path d="M40 680 L56 686 L56 700 Q56 712 40 717 Q24 712 24 700 L24 686 Z"/>
    <rect x="38" y="692" width="4" height="10" rx="1" fill="white"/>
    <rect x="34" y="695" width="12" height="4" rx="1" fill="white"/>
  </g>

  <!-- ECG line subtle -->
  <polyline points="0,700 100,700 140,700 160,640 180,760 200,700 720,700"
    stroke="rgba(96,165,250,0.12)" stroke-width="1.5" fill="none"/>

  <!-- Dot grid -->
  <pattern id="d2" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.08"/>
  </pattern>
  <rect width="720" height="900" fill="url(#d2)"/>

  <!-- Diagonal accent lines -->
  <line x1="0" y1="900" x2="720" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="60"/>
  <line x1="-200" y1="900" x2="520" y2="0" stroke="rgba(59,130,246,0.06)" stroke-width="40"/>
</svg>
